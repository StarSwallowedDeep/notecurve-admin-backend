server.port=8081
spring.application.name=admin-service

# MySQL (admin_db)
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/notecurve_db?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.url=jdbc:mysql://10.0.0.6:3306/admin_db?serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET_KEY}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=admin-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Spring Cloud
spring.cloud.compatibility-verifier.enabled=false

# Main Server URL
main.server.url=${MAIN_SERVER_URL:http://host.docker.internal:8080}
